schema_version: 1

context:
  version: "4.2.0"

package:
  name: pycantonese
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pycantonese/pycantonese-${{ version }}.tar.gz
  sha256: 5a9ec7a8a10b08ef0ff12772b51c6f7a22727503bfbeb9edfea4eb90fc77d68c

build:
  number: 0
  script:
    - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - ${{ stdlib('c') }}
  host:
    - python
    - pip
    - maturin >=1.0,<2.0
  run:
    - python
    - rustling >=0.7.0

tests:
  - python:
      imports:
        - pycantonese
      pip_check: true

about:
  summary: Cantonese Linguistics and NLP in Python
  license: MIT
  license_file:
    - LICENSE.txt
    - THIRDPARTY.yml
  homepage: https://pycantonese.org

extra:
  recipe-maintainers:
    - jacksonllee
